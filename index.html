<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rutina de Jessi</title>
<style>
  :root{
    --bg:#ffffff; --card:#FBFBFC; --border:#EEEFF1;
    --ink:#1B1B1B; --muted:#8B8B8B;
    --orange:#EC9A52; --teal:#46697A; --chip:#BFD6DE; --serie:#DDEBF1;
    --note:#FBF1E6; --radius:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink)}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
    max-width:560px;margin:0 auto;padding:22px 20px 110px;
    padding-top:max(22px,env(safe-area-inset-top));
  }
  h1{font-size:30px;font-weight:800;margin:0}
  .top{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:8px}
  .back{position:absolute;left:0;background:none;border:none;font-size:30px;line-height:1;color:var(--ink);cursor:pointer;padding:2px 8px}
  .sub{color:var(--muted);font-size:15px;margin:0 0 18px;text-align:center}

  .tabs{display:flex;gap:6px;background:#F1F3F5;border-radius:16px;padding:5px;margin:0 0 22px}
  .tabs button{flex:1;border:none;background:transparent;padding:10px;border-radius:12px;font-size:15px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit}
  .tabs button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 22px 10px;margin-bottom:18px;box-shadow:0 1px 2px rgba(0,0,0,.02)}
  .card.tap{cursor:pointer;transition:transform .12s ease}
  .card.tap:active{transform:scale(.985)}
  .card h2{font-size:23px;font-weight:800;margin:0 0 14px}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;font-size:18px;gap:14px}
  .row .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .x{color:var(--muted);font-variant-numeric:tabular-nums;flex:none}

  .ex{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
  .ex .name-in{font-size:20px;font-weight:700;line-height:1.2;margin-bottom:14px;width:100%;border:none;background:transparent;color:var(--ink);outline:none;border-bottom:1px dashed transparent;padding:2px 0}
  .ex .name-in:focus{border-bottom-color:var(--chip)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stat{background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px 8px;text-align:center}
  .stat .k{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .stat input{width:100%;border:none;background:transparent;text-align:center;font-size:18px;font-weight:700;margin-top:4px;color:var(--ink);outline:none}
  .stat input:focus{color:var(--teal)}
  .field{margin-top:12px}
  .field label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px}
  .field input{width:100%;border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:15px;color:var(--ink);background:#fff;outline:none;font-family:inherit}
  .field input:focus{border-color:var(--chip)}
  .field.nota input{background:var(--note);border-color:#F0DEC8}
  .head-label{font-size:22px;font-weight:800;margin:24px 0 12px}

  .savebar{position:fixed;left:0;right:0;bottom:0;padding:14px 20px max(14px,env(safe-area-inset-bottom));background:linear-gradient(to top,#fff 70%,rgba(255,255,255,0));max-width:560px;margin:0 auto;display:flex;gap:10px;flex-direction:column}
  .savebar .btns{display:flex;gap:10px}
  .savebar button{flex:1;border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:800;cursor:pointer}
  #save{background:var(--orange);color:#fff}
  #reg{background:var(--teal);color:#fff}
  .savebar button:disabled{opacity:.55;cursor:default}
  .savebar .msg{text-align:center;font-size:13px;color:var(--muted);min-height:16px}

  select{width:100%;border:1px solid var(--border);border-radius:14px;padding:13px 14px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);margin-bottom:18px}
  .chartwrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
  .metric{display:flex;gap:8px;margin-bottom:14px}
  .metric button{flex:1;border:1px solid var(--border);background:#fff;border-radius:12px;padding:9px;font-weight:700;font-size:14px;color:var(--muted);cursor:pointer;font-family:inherit}
  .metric button.on{background:var(--serie);color:var(--teal);border-color:var(--chip)}

  .state{text-align:center;color:var(--muted);padding:60px 20px;line-height:1.5}
  .state b{color:var(--ink)}
  @media (prefers-reduced-motion:reduce){.card.tap{transition:none}}
</style>
</head>
<body>
  <div id="app"><div class="state">Cargando…</div></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc, addDoc }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBU7g0qQFv3La_evrvASYgYFQI3t9wimSw",
  authDomain: "asesoriasjessi.firebaseapp.com",
  projectId: "asesoriasjessi",
  storageBucket: "asesoriasjessi.firebasestorage.app",
  messagingSenderId: "363108342077",
  appId: "1:363108342077:web:2d2bce050eccd3fd814d54"
};

const db = getFirestore(initializeApp(firebaseConfig));
const root = document.getElementById("app");
let alumna="Rutina", rutinas=[], historial=[], tab="rutina", chart=null, metric="peso";

function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function att(s){return (s??"").toString().replace(/"/g,"&quot;");}
function num(s){const m=String(s??"").replace(",",".").match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;}

async function loadRutinas(){
  const snap = await getDocs(query(collection(db,"rutinas"), orderBy("orden")));
  const docs = snap.docs.map(d=>({_id:d.id, ...d.data()})).filter(r=>!r.archivada);
  if(docs.length) alumna = docs[0].alumna || "Rutina";
  rutinas = docs.map(r=>({...r, ejercicios:(r.ejercicios||[])}));
}
async function loadHistorial(){
  const snap = await getDocs(query(collection(db,"historial"), orderBy("fecha")));
  historial = snap.docs.map(d=>d.data());
}

function shell(inner){
  return `
    <div class="top">${tab==="detail"?'<button class="back" aria-label="Volver">‹</button>':''}<h1>${tab==="progreso"?"Progreso":"Rutina"}</h1></div>
    <div class="sub">${esc(alumna)}</div>
    ${tab!=="detail"?`<div class="tabs">
      <button data-t="rutina" class="${tab==="rutina"?"on":""}">Rutina</button>
      <button data-t="progreso" class="${tab==="progreso"?"on":""}">Progreso</button>
    </div>`:""}
    ${inner}`;
}
function wireTabs(){
  root.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{tab=b.dataset.t; render();});
}

function render(){
  if(tab==="rutina") renderList();
  else if(tab==="progreso") renderProgreso();
}

function renderList(){
  const cards = rutinas.map((r,i)=>{
    const lines = r.ejercicios.map(e=>`<div class="row"><span class="name">${esc(e.nombre)}</span><span class="x">x${e.sets??"-"}</span></div>`).join("");
    return `<div class="card tap" data-i="${i}"><h2>${esc(r.nombre)}</h2>${lines}</div>`;
  }).join("");
  root.innerHTML = shell(cards || `<div class="state">Aún no hay rutina asignada.</div>`);
  wireTabs();
  root.querySelectorAll(".card.tap").forEach(c=>c.onclick=()=>{renderDetail(+c.dataset.i);window.scrollTo(0,0);});
}

function renderDetail(i){
  tab="detail";
  const r = rutinas[i];
  const ex = r.ejercicios.map((e,j)=>`
    <div class="ex" data-j="${j}">
      <input class="name-in" data-k="nombre" value="${att(e.nombre)}" placeholder="Ejercicio" />
      <div class="stats">
        <div class="stat"><div class="k">Sets</div><input inputmode="numeric" data-k="sets" value="${att(e.sets)}" /></div>
        <div class="stat"><div class="k">Reps</div><input data-k="reps" value="${att(e.reps)}" /></div>
        <div class="stat"><div class="k">Peso</div><input data-k="peso" value="${att(e.peso)}" /></div>
      </div>
      <div class="field"><label>Descanso</label><input data-k="descanso" value="${att(e.descanso)}" placeholder="—" /></div>
      <div class="field nota"><label>Nota</label><input data-k="nota" value="${att(e.nota)}" placeholder="—" /></div>
    </div>`).join("");
  root.innerHTML = shell(`<div class="head-label">Ejercicios</div>${ex}
    <div class="savebar"><div class="btns"><button id="save">Guardar cambios</button><button id="reg">Registrar semana</button></div><div class="msg" id="msg"></div></div>`);
  wireTabs();
  root.querySelector(".back").onclick=()=>{tab="rutina";renderList();window.scrollTo(0,0);};

  root.querySelectorAll(".ex").forEach(card=>{
    const j=+card.dataset.j;
    card.querySelectorAll("[data-k]").forEach(inp=>inp.oninput=()=>{
      let v=inp.value;
      if(inp.dataset.k==="sets"){v=v.trim()===""?null:(isNaN(+v)?v:+v);}
      r.ejercicios[j][inp.dataset.k]=v;
    });
  });

  const msg=root.querySelector("#msg");
  const save=root.querySelector("#save"), reg=root.querySelector("#reg");
  save.onclick=async()=>{
    save.disabled=true; msg.textContent="Guardando…";
    try{ await updateDoc(doc(db,"rutinas",r._id),{ejercicios:r.ejercicios}); msg.textContent="Guardado ✓"; }
    catch(e){ console.error(e); msg.textContent="Error al guardar."; }
    save.disabled=false;
  };
  reg.onclick=async()=>{
    reg.disabled=true; msg.textContent="Registrando…";
    const fecha=new Date().toISOString();
    try{
      for(const e of r.ejercicios){
        await addDoc(collection(db,"historial"),{
          dia:r.nombre, ejercicio:e.nombre, fecha,
          sets:e.sets??null,
          reps_txt:e.reps??"", reps_num:num(e.reps),
          peso_txt:e.peso??"", peso_num:num(e.peso)
        });
      }
      msg.textContent="Semana registrada ✓";
    }catch(e){ console.error(e); msg.textContent="Error al registrar."; }
    reg.disabled=false;
  };
}

async function renderProgreso(){
  root.innerHTML = shell(`<div class="state">Cargando historial…</div>`);
  wireTabs();
  try{ await loadHistorial(); }catch(e){ console.error(e); root.innerHTML=shell(`<div class="state"><b>No se pudo cargar el historial.</b></div>`); wireTabs(); return; }

  if(!historial.length){
    root.innerHTML = shell(`<div class="state">Aún no hay registros.<br>Entra a un día y pulsa <b>Registrar semana</b>.</div>`);
    wireTabs(); return;
  }
  const ejercicios=[...new Set(historial.map(h=>h.ejercicio))].sort();
  const opts=ejercicios.map(n=>`<option value="${att(n)}">${esc(n)}</option>`).join("");
  root.innerHTML = shell(`
    <select id="exSel">${opts}</select>
    <div class="metric">
      <button data-m="peso" class="${metric==="peso"?"on":""}">Peso</button>
      <button data-m="reps" class="${metric==="reps"?"on":""}">Reps</button>
    </div>
    <div class="chartwrap"><canvas id="chart" height="260"></canvas></div>`);
  wireTabs();
  const sel=root.querySelector("#exSel");
  root.querySelectorAll(".metric button").forEach(b=>b.onclick=()=>{metric=b.dataset.m;renderProgreso();});
  sel.onchange=()=>draw(sel.value);
  draw(ejercicios[0]);
}

function draw(nombre){
  const key=metric==="peso"?"peso_num":"reps_num";
  const reg=historial.filter(h=>h.ejercicio===nombre && h[key]!=null);
  const porFecha={};
  reg.forEach(h=>{porFecha[h.fecha.slice(0,10)]=h[key];});
  const labels=Object.keys(porFecha).sort();
  const data=labels.map(l=>porFecha[l]);
  const fmt=labels.map(l=>new Date(l).toLocaleDateString("es-MX",{day:"2-digit",month:"short"}));
  if(chart) chart.destroy();
  chart=new Chart(root.querySelector("#chart"),{
    type:"line",
    data:{labels:fmt,datasets:[{label:metric==="peso"?"Peso":"Reps",data,
      borderColor:"#EC9A52",backgroundColor:"rgba(236,154,82,.12)",fill:true,tension:.3,
      pointRadius:4,pointBackgroundColor:"#EC9A52"}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:false}},
      responsive:true,maintainAspectRatio:false}
  });
}

(async()=>{
  try{ await loadRutinas(); render(); }
  catch(e){ console.error(e); root.innerHTML=`<div class="state"><b>No se pudo cargar la rutina.</b><br>Revisa reglas y config.</div>`; }
})();
</script>
</body>
</html>

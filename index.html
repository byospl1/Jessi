  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lue=\"{{ ex.nombre }}\" onchange=\"{{ ex.onNombre }}\" placeholder=\"Ejercicio\" style=\"{{ ex.nameStyle }}\">\n                <button onclick=\"{{ ex.toggle }}\" title=\"Marcar completado\" style=\"{{ ex.checkStyle }}\">{{ ex.checkMark }}<\/button>\n              <\/div>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px\">\n                <div style=\"background:#120c0b;border:1px solid #3a2418;border-radius:12px;padding:8px 6px;text-align:center\">\n                  <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B\">SETS<\/div>\n                  <input value=\"{{ ex.sets }}\" onchange=\"{{ ex.onSets }}\" inputmode=\"numeric\" style=\"width:100%;box-sizing:border-box;text-align:center;font-family:Oswald;font-weight:700;font-size:19px;color:#F0C64A;background:transparent;border:none;outline:none;margin-top:3px\">\n                <\/div>\n                <div style=\"background:#120c0b;border:1px solid #3a2418;border-radius:12px;padding:8px 6px;text-align:center\">\n                  <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B\">REPS<\/div>\n                  <input value=\"{{ ex.reps }}\" onchange=\"{{ ex.onReps }}\" style=\"width:100%;box-sizing:border-box;text-align:center;font-family:Oswald;font-weight:700;font-size:19px;color:#F4ECD8;background:transparent;border:none;outline:none;margin-top:3px\">\n                <\/div>\n                <div style=\"background:#120c0b;border:1px solid #3a2418;border-radius:12px;padding:8px 6px;text-align:center\">\n                  <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B\">PESO<\/div>\n                  <input value=\"{{ ex.peso }}\" onchange=\"{{ ex.onPeso }}\" style=\"width:100%;box-sizing:border-box;text-align:center;font-family:Oswald;font-weight:700;font-size:19px;color:#F4ECD8;background:transparent;border:none;outline:none;margin-top:3px\">\n                <\/div>\n              <\/div>\n              <div style=\"margin-top:11px\">\n                <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B;margin-bottom:5px\">DESCANSO<\/div>\n                <input value=\"{{ ex.descanso }}\" onchange=\"{{ ex.onDescanso }}\" placeholder=\"—\" style=\"width:100%;box-sizing:border-box;font-family:'DM Sans';font-size:15px;color:#F4ECD8;background:#120c0b;border:1px solid #3a2418;border-radius:10px;padding:9px 11px;outline:none\">\n              <\/div>\n              <div style=\"margin:11px 0\">\n                <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B;margin-bottom:5px\">NOTA<\/div>\n                <input value=\"{{ ex.nota }}\" onchange=\"{{ ex.onNota }}\" placeholder=\"—\" style=\"width:100%;box-sizing:border-box;font-family:'DM Sans';font-size:15px;color:#F4ECD8;background:#1e130c;border:1px solid #5a3410;border-radius:10px;padding:9px 11px;outline:none\">\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/sc-for>\n        <div style=\"height:96px\"><\/div>\n      <\/div>\n      <div style=\"position:fixed;left:0;right:0;bottom:0;z-index:20\">\n        <div style=\"max-width:600px;margin:0 auto;padding:14px 20px 20px;background:linear-gradient(to top,#0b0808 66%,rgba(11,8,8,0))\">\n          <button onclick=\"{{ detail.save }}\" disabled=\"{{ detail.saving }}\" style=\"width:100%;border:none;border-radius:14px;padding:16px;font-family:Anton;font-size:20px;letter-spacing:1.5px;color:#0b0808;background:linear-gradient(135deg,#F0C64A,#C9962B);cursor:pointer;box-shadow:0 8px 24px rgba(240,198,74,.28),inset 0 1px 0 rgba(255,255,255,.4);text-transform:uppercase\">{{ detail.saveLabel }}<\/button>\n          <div style=\"text-align:center;font-family:Oswald;font-weight:600;font-size:14px;color:#F0C64A;margin-top:8px;min-height:18px;letter-spacing:.5px\">{{ detail.saveMsg }}<\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- ===== HISTORIAL ===== -->\n    <sc-if value=\"{{ isHistory }}\">\n      <div style=\"padding:18px 20px 44px\">\n        <button onclick=\"{{ history.back }}\" style=\"display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:#F0C64A;font-family:Oswald;font-weight:700;font-size:15px;letter-spacing:1px;cursor:pointer;padding:0;margin-bottom:16px\">‹ VOLVER A LA CARTELERA<\/button>\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\">\n          <span style=\"font-family:Oswald;font-weight:700;font-size:11px;color:#0b0808;background:#F0C64A;border-radius:6px;padding:3px 9px;letter-spacing:1px\">🏆 PALMARÉS<\/span>\n        <\/div>\n        <h2 style=\"font-family:Anton;font-size:40px;line-height:.96;color:#F4ECD8;margin:6px 0 2px;text-transform:uppercase;letter-spacing:1px\">Semanas<br>pasadas<\/h2>\n        <div style=\"height:4px;width:64px;background:#C1121F;border-radius:2px;margin:12px 0 22px\"><\/div>\n\n        <sc-if value=\"{{ history.empty }}\">\n          <div style=\"text-align:center;padding:40px 20px;color:#9a8f82;font-family:'DM Sans';line-height:1.6\">\n            <div style=\"font-size:40px;margin-bottom:12px\">🗓️<\/div>\n            <b style=\"color:#F4ECD8;font-family:Oswald;letter-spacing:1px\">AÚN NO HAY SEMANAS PASADAS<\/b><br>\n            Completa funciones esta semana y aquí quedará tu registro.\n          <\/div>\n        <\/sc-if>\n\n        <sc-for list=\"{{ history.weeks }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <div style=\"{{ w._wrap }}\">\n            <div style=\"background:#17100e;border:1.5px solid #C9962B;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 8px 20px rgba(0,0,0,.4)\">\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px\">\n                <div style=\"min-width:0\">\n                  <div style=\"font-family:Anton;font-size:22px;color:#F4ECD8;letter-spacing:.5px\">{{ w.range }}<\/div>\n                  <div style=\"font-family:Oswald;font-weight:600;font-size:10px;letter-spacing:2px;color:#9a8f82;margin-top:2px\">SEMANA {{ w.weekNum }}<\/div>\n                <\/div>\n                <sc-if value=\"{{ w.champ }}\">\n                  <span style=\"flex:none;font-family:Oswald;font-weight:700;font-size:11px;letter-spacing:1px;color:#0b0808;background:linear-gradient(135deg,#F0C64A,#C9962B);border-radius:20px;padding:5px 11px\">👑 CAMPEONA<\/span>\n                <\/sc-if>\n              <\/div>\n              <div style=\"display:flex;gap:24px;margin-bottom:13px\">\n                <div>\n                  <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B\">FUNCIONES<\/div>\n                  <div style=\"font-family:Anton;font-size:26px;color:#F0C64A;line-height:1.1\">{{ w.ganadas }}<span style=\"font-family:Oswald;font-weight:700;font-size:14px;color:#9a8f82\">/{{ w.total }}<\/span><\/div>\n                <\/div>\n                <div>\n                  <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B\">EJERCICIOS<\/div>\n                  <div style=\"font-family:Anton;font-size:26px;color:#F4ECD8;line-height:1.1\">{{ w.ejercicios }}<\/div>\n                <\/div>\n              <\/div>\n              <div style=\"position:relative;height:8px;border-radius:5px;background:#120c0b;border:1px solid #3a2418;overflow:hidden\">\n                <div style=\"{{ w.fillStyle }}\"><\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/sc-if>\n\n    <!-- ===== CAMPANA DE RING ===== -->\n    <sc-if value=\"{{ bellShow }}\">\n      <div style=\"position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;pointer-events:none;background:radial-gradient(circle at 50% 42%, rgba(11,8,8,.45), transparent 60%)\">\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center\">\n          <div style=\"position:absolute;top:8px;width:130px;height:130px;border-radius:50%;border:4px solid #F0C64A;animation:ringWave 1s ease-out both\"><\/div>\n          <div style=\"position:absolute;top:8px;width:130px;height:130px;border-radius:50%;border:4px solid #C1121F;animation:ringWave 1s ease-out .16s both\"><\/div>\n          <div style=\"position:absolute;top:8px;width:130px;height:130px;border-radius:50%;border:3px solid #F0C64A;animation:ringWave 1s ease-out .32s both\"><\/div>\n          <div style=\"font-size:92px;line-height:1;transform-origin:50% 14%;filter:drop-shadow(0 10px 20px rgba(0,0,0,.55));animation:bellPop .35s cubic-bezier(.2,.85,.3,1.2) both, bellRing .42s ease-in-out .28s 3\">🔔<\/div>\n          <div style=\"margin-top:6px;font-family:Anton;font-size:36px;letter-spacing:4px;color:#F0C64A;text-transform:uppercase;text-shadow:0 3px 0 #7d0a12,0 6px 16px rgba(0,0,0,.6);animation:titleSlam .5s cubic-bezier(.2,.85,.3,1.1) both\">¡Ding Ding!<\/div>\n          <div style=\"margin-top:4px;font-family:Oswald;font-weight:700;font-size:13px;letter-spacing:3px;color:#F4ECD8;animation:bellPop .4s ease-out .12s both\">FUNCIÓN GANADA<\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n  <\/div>\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 600, &quot;height&quot;: 1040 },\n  &quot;entranceFx&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Impacto&quot;, &quot;Rebote&quot;, &quot;Ninguna&quot;], &quot;default&quot;: &quot;Impacto&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Animación&quot;, &quot;label&quot;: &quot;Entrada de tarjetas&quot; },\n  &quot;showSunburst&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Estilo&quot;, &quot;label&quot;: &quot;Rayos de sol (sunburst)&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'list', selected: null,\n    loading: true, error: false,\n    saving: false, saveMsg: '',\n    rutinas: [], alumna: 'Jessi', detailEx: [],\n    doneIds: [], exDone: [], bellShow: false\n  };\n\n  playDing() {\n    try {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      if (!AC) return;\n      if (!this._ac) this._ac = new AC();\n      const ac = this._ac;\n      if (ac.state === 'suspended') ac.resume();\n      const now = ac.currentTime;\n      [0, 0.2, 0.4].forEach((t, idx) => {\n        const s = now + t;\n        const freq = idx === 2 ? 1180 : 940;\n        [1, 2.76].forEach((mult, k) => {\n          const o = ac.createOscillator(), g = ac.createGain();\n          o.type = 'triangle';\n          o.frequency.value = freq * mult;\n          o.connect(g); g.connect(ac.destination);\n          const peak = k === 0 ? 0.3 : 0.12;\n          g.gain.setValueAtTime(0.0001, s);\n          g.gain.exponentialRampToValueAtTime(peak, s + 0.008);\n          g.gain.exponentialRampToValueAtTime(0.0001, s + 0.2);\n          o.start(s); o.stop(s + 0.22);\n        });\n      });\n    } catch (e) {}\n  }\n\n  ringBell() {\n    this.playDing();\n    if (this._bellT) clearTimeout(this._bellT);\n    this.setState({ bellShow: false }, () => {\n      requestAnimationFrame(() => this.setState({ bellShow: true }));\n    });\n    this._bellT = setTimeout(() => this.setState({ bellShow: false }), 1500);\n  }\n\n  weekKey() {\n    const d = new Date();\n    const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));\n    const day = (t.getUTCDay() + 6) % 7;\n    t.setUTCDate(t.getUTCDate() - day + 3);\n    const firstThu = new Date(Date.UTC(t.getUTCFullYear(), 0, 4));\n    const week = 1 + Math.round(((t - firstThu) / 86400000 - 3 + ((firstThu.getUTCDay() + 6) % 7)) / 7);\n    return t.getUTCFullYear() + '-W' + week;\n  }\n\n  weekRange() {\n    const d = new Date();\n    const day = (d.getDay() + 6) % 7;\n    const mon = new Date(d); mon.setDate(d.getDate() - day);\n    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);\n    const M = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];\n    return mon.getDate() + ' ' + M[mon.getMonth()] + ' – ' + sun.getDate() + ' ' + M[sun.getMonth()];\n  }\n\n  toggleDone(id, ev) {\n    if (ev && ev.stopPropagation) ev.stopPropagation();\n    const cur = (this.state.doneIds || []).slice();\n    const i = cur.indexOf(id);\n    const adding = i < 0;\n    if (adding) cur.push(id); else cur.splice(i, 1);\n    this.setState({ doneIds: cur });\n    this.saveProgress({ prog: cur });\n    if (adding) this.ringBell();\n  }\n\n  toggleEx(dayId, j) {\n    const cur = (this.state.exDone || []).slice();\n    const key = dayId + '#' + j;\n    const idx = cur.indexOf(key);\n    const adding = idx < 0;\n    if (adding) cur.push(key); else cur.splice(idx, 1);\n    this.setState({ exDone: cur });\n    this.saveProgress({ ex: cur });\n    if (adding) {\n      this.playTick();\n      const r = this.state.rutinas.find(x => x._id === dayId);\n      const total = r ? (r.ejercicios || []).length : 0;\n      const doneN = cur.filter(k => k.indexOf(dayId + '#') === 0).length;\n      if (total > 0 && doneN === total && (this.state.doneIds || []).indexOf(dayId) < 0) {\n        const dd = (this.state.doneIds || []).slice(); dd.push(dayId);\n        this.setState({ doneIds: dd });\n        this.saveProgress({ prog: dd });\n        this.ringBell();\n      }\n    }\n  }\n\n  playTick() {\n    try {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      if (!AC) return;\n      if (!this._ac) this._ac = new AC();\n      const ac = this._ac; if (ac.state === 'suspended') ac.resume();\n      const o = ac.createOscillator(), g = ac.createGain();\n      o.type = 'square'; o.frequency.value = 1320;\n

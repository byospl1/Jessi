document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ansform:rotate(-17deg)}58%{transform:rotate(12deg)}78%{transform:rotate(-7deg)}}\n  @keyframes ringWave{0%{transform:scale(.35);opacity:.75}100%{transform:scale(2.6);opacity:0}}\n  @keyframes bellPop{0%{transform:scale(.4);opacity:0}55%{transform:scale(1.12);opacity:1}100%{transform:scale(1)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#0b0808;background-image:radial-gradient(140% 62% at 50% 0%, rgba(125,10,18,.20), transparent 62%)\">\n  <div style=\"max-width:600px;margin:0 auto;position:relative\">\n\n    <!-- ===== HERO / POSTER HEADER ===== -->\n    <div style=\"position:relative;overflow:hidden;border-bottom:3px solid #F0C64A;min-height:214px\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"c7e0ed7b-5d87-44f2-a8f3-233a80bd273c#/image-slot.js\" id=\"santo-bg\" fit=\"cover\" placeholder=\"Arrastra aquí una foto de El Santo\" hint-size=\"100%,100%\" style=\"position:absolute;inset:0;width:100%;height:100%;opacity:.5\"><\u002Fx-import>\n      <sc-if value=\"{{ sunburst }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:absolute;left:50%;top:-45%;width:170%;height:210%;transform:translateX(-50%);pointer-events:none;opacity:.11;background:repeating-conic-gradient(from 0deg at 50% 50%, #F0C64A 0deg 5deg, transparent 5deg 10deg);animation:sunspin 70s linear infinite\"><\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"position:absolute;inset:0;pointer-events:none;background:radial-gradient(120% 90% at 50% 6%, rgba(240,198,74,.10), transparent 55%),linear-gradient(180deg, rgba(11,8,8,.5) 0%, rgba(125,10,18,.4) 46%, rgba(11,8,8,.96) 100%)\"><\u002Fdiv>\n      <div style=\"position:relative;pointer-events:none;text-align:center;padding:32px 20px 26px\">\n        <div style=\"font-size:24px;letter-spacing:8px;margin-bottom:8px\">🎭🤼🎭<\u002Fdiv>\n        <div style=\"font-family:Oswald;font-weight:600;font-size:11px;letter-spacing:4px;color:#F0C64A;margin-bottom:8px\">ASESORÍAS JESSI · TEMPORADA 2026<\u002Fdiv>\n        <h1 style=\"font-family:Anton;font-size:52px;line-height:.88;color:#F4ECD8;margin:0;text-transform:uppercase;letter-spacing:1px;text-shadow:0 3px 0 #7d0a12,0 7px 18px rgba(0,0,0,.55);animation:titleSlam .6s cubic-bezier(.2,.85,.3,1.1) both\">Rutina<br>de Jessi<\u002Fh1>\n        <div style=\"display:inline-block;margin-top:14px;font-family:Oswald;font-weight:700;font-size:12px;letter-spacing:2px;color:#0b0808;background:#F0C64A;padding:5px 16px;border-radius:20px;box-shadow:0 4px 12px rgba(240,198,74,.25)\">PROGRAMA DE ENTRENAMIENTO<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== LOADING ===== -->\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center;padding:72px 20px\">\n        <div style=\"font-size:36px;display:inline-block;animation:bellRing 1.2s ease-in-out infinite\">🔔<\u002Fdiv>\n        <div style=\"margin-top:14px;font-family:Oswald;font-weight:600;letter-spacing:3px;font-size:13px;color:#F0C64A\">PREPARANDO EL RING…<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== ERROR ===== -->\n    <sc-if value=\"{{ error }}\">\n      <div style=\"text-align:center;padding:60px 26px;color:#9a8f82;font-family:'DM Sans';line-height:1.6\">\n        <div style=\"font-size:42px;margin-bottom:12px\">🥊<\u002Fdiv>\n        <b style=\"color:#F4ECD8;font-family:Oswald;letter-spacing:1px;font-size:16px\">NO SE PUDO CARGAR LA RUTINA<\u002Fb><br>\n        Revisa las reglas de Firestore y la configuración.\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== LIST / CARTELERA ===== -->\n    <sc-if value=\"{{ isList }}\">\n      <div style=\"padding:22px 20px 0\">\n        <div style=\"background:#17100e;border:1.5px solid #C9962B;border-radius:18px;padding:18px 18px 16px;box-shadow:0 12px 28px rgba(0,0,0,.45)\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px\">\n            <div style=\"min-width:0\">\n              <div style=\"font-family:Anton;font-size:20px;color:#F4ECD8;letter-spacing:1px;text-transform:uppercase\">Progreso de la semana<\u002Fdiv>\n              <div style=\"font-family:Oswald;font-weight:600;font-size:11px;letter-spacing:2px;color:#9a8f82;margin-top:2px\">🏆 {{ progress.range }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:3px;flex:none\">\n              <span style=\"font-family:Anton;font-size:36px;color:#F0C64A;line-height:1\">{{ progress.doneCount }}<\u002Fspan>\n              <span style=\"font-family:Oswald;font-weight:700;font-size:17px;color:#9a8f82\">/ {{ progress.total }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:relative;height:14px;border-radius:8px;background:#120c0b;border:1px solid #3a2418;overflow:hidden\">\n            <div style=\"{{ progress.fillStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;margin-top:15px\">\n            <sc-for list=\"{{ days }}\" as=\"day\" hint-placeholder-count=\"4\">\n              <div sc-camel-on-click=\"{{ day.toggleDone }}\" style=\"flex:1;cursor:pointer;text-align:center;user-select:none\">\n                <div style=\"{{ day.medalStyle }}\">{{ day.medalMark }}<\u002Fdiv>\n                <div style=\"font-family:Oswald;font-weight:700;font-size:10px;letter-spacing:1px;color:#9a8f82;margin-top:6px\">{{ day.short }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ progress.allDone }}\">\n            <div style=\"margin-top:15px;text-align:center;background:linear-gradient(135deg,#C1121F,#7d0a12);border:1px solid #F0C64A;border-radius:12px;padding:11px;font-family:Anton;font-size:17px;letter-spacing:1px;color:#F0C64A;text-transform:uppercase;animation:impactIn .5s cubic-bezier(.2,.85,.3,1.15) both\">👑 ¡Campeona de la semana! 🏆<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:14px 20px 0\">\n        <button sc-camel-on-click=\"{{ openHistory }}\" style=\"width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:1.5px dashed #3a2418;border-radius:14px;padding:13px;font-family:Oswald;font-weight:700;font-size:13px;letter-spacing:2px;color:#F0C64A;cursor:pointer\">📜 HISTORIAL DE SEMANAS ▸<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:24px 20px 4px\">\n        <div style=\"display:flex;align-items:center;gap:12px\">\n          <div style=\"flex:1;height:2px;background:linear-gradient(90deg,transparent,#C9962B)\"><\u002Fdiv>\n          <span style=\"font-family:Anton;font-size:15px;color:#C1121F;letter-spacing:2px;text-transform:uppercase\">Cartelera de la semana<\u002Fspan>\n          <div style=\"flex:1;height:2px;background:linear-gradient(90deg,#C9962B,transparent)\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:16px 20px 44px\">\n        <sc-for list=\"{{ days }}\" as=\"day\" hint-placeholder-count=\"4\">\n          <div style=\"{{ day._wrap }}\">\n            <div sc-camel-on-click=\"{{ day.open }}\" style=\"cursor:pointer;position:relative;background:#17100e;border:1.5px solid #C9962B;border-radius:18px;margin-bottom:18px;overflow:hidden;box-shadow:0 12px 28px rgba(0,0,0,.5)\">\n              <sc-if value=\"{{ day.done }}\">\n                <div style=\"position:absolute;inset:0;border-radius:18px;border:2px solid #F0C64A;box-shadow:inset 0 0 24px rgba(240,198,74,.32);pointer-events:none;z-index:3\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(135deg,#C1121F,#7d0a12);padding:12px 16px;border-bottom:2px solid #F0C64A\">\n                <div style=\"display:flex;align-items:center;gap:10px;min-width:0\">\n                  <span style=\"font-size:20px\">🎭<\u002Fspan>\n vents:none;z-index:2\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px;position:relative;z-index:3\">\n                <span style=\"font-family:Oswald;font-weight:700;font-size:12px;color:#0b0808;background:#F0C64A;border-radius:6px;padding:2px 8px;letter-spacing:1px;flex:none\">{{ ex.num }}<\u002Fspan>\n                <input value=\"{{ ex.nombre }}\" sc-camel-on-change=\"{{ ex.onNombre }}\" placeholder=\"Ejercicio\" style=\"{{ ex.nameStyle }}\">\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:30px minmax(0,1fr) 54px 44px 32px 26px;gap:7px;align-items:center;padding:0 2px 8px;position:relative;z-index:3\">\n                <span style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1px;color:#C9962B\">SERIE<\u002Fspan>\n                <span style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1px;color:#C9962B\">⏮ ANTERIOR<\u002Fspan>\n                <span style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1px;color:#C9962B;text-align:center\">LBS<\u002Fspan>\n                <span style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1px;color:#C9962B;text-align:center\">REP<\u002Fspan>\n                <span><\u002Fspan>\n                <span><\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ ex.series }}\" as=\"se\" hint-placeholder-count=\"3\">\n                <div style=\"display:grid;grid-template-columns:30px minmax(0,1fr) 54px 44px 32px 26px;gap:7px;align-items:center;margin-bottom:8px;position:relative;z-index:3\">\n                  <span style=\"font-family:Anton;font-size:16px;color:#F0C64A;background:#120c0b;border:1px solid #3a2418;border-radius:8px;text-align:center;padding:7px 0\">{{ se.num }}<\u002Fspan>\n                  <span style=\"font-family:'DM Sans';font-size:14px;color:#9a8f82;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ se.anterior }}<\u002Fspan>\n                  <input value=\"{{ se.peso }}\" sc-camel-on-change=\"{{ se.onPeso }}\" inputmode=\"numeric\" placeholder=\"—\" style=\"width:100%;box-sizing:border-box;text-align:center;font-family:Oswald;font-weight:700;font-size:17px;color:#F4ECD8;background:#120c0b;border:1px solid #3a2418;border-radius:10px;padding:8px 2px;outline:none\">\n                  <input value=\"{{ se.reps }}\" sc-camel-on-change=\"{{ se.onReps }}\" inputmode=\"numeric\" placeholder=\"—\" style=\"width:100%;box-sizing:border-box;text-align:center;font-family:Oswald;font-weight:700;font-size:17px;color:#F4ECD8;background:#120c0b;border:1px solid #3a2418;border-radius:10px;padding:8px 2px;outline:none\">\n                  <button sc-camel-on-click=\"{{ se.toggle }}\" title=\"Serie completada\" style=\"{{ se.checkStyle }}\">{{ se.checkMark }}<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ se.remove }}\" title=\"Eliminar serie\" style=\"{{ se.removeStyle }}\">✕<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <button sc-camel-on-click=\"{{ ex.addSerie }}\" style=\"width:100%;margin-top:4px;background:transparent;border:1.5px dashed #C9962B;border-radius:10px;padding:10px;font-family:Oswald;font-weight:700;font-size:12px;letter-spacing:1.5px;color:#F0C64A;cursor:pointer;position:relative;z-index:3\">+ AGREGAR SERIE<\u002Fbutton>\n              <div style=\"margin:14px 0 11px;position:relative;z-index:3\">\n                <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B;margin-bottom:5px\">NOTA<\u002Fdiv>\n                <input value=\"{{ ex.nota }}\" sc-camel-on-change=\"{{ ex.onNota }}\" placeholder=\"—\" style=\"width:100%;box-sizing:border-box;font-family:'DM Sans';font-size:15px;color:#F4ECD8;background:#1e130c;border:1px solid #5a3410;border-radius:10px;padding:9px 11px;outline:none\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"height:96px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:fixed;left:0;right:0;bottom:0;z-index:20\">\n        <div style=\"max-width:600px;margin:0 auto;padding:14px 20px 20px;background:linear-gradient(to top,#0b0808 66%,rgba(11,8,8,0))\">\n          <button sc-camel-on-click=\"{{ detail.save }}\" disabled=\"{{ detail.saving }}\" style=\"width:100%;border:none;border-radius:14px;padding:16px;font-family:Anton;font-size:20px;letter-spacing:1.5px;color:#0b0808;background:linear-gradient(135deg,#F0C64A,#C9962B);cursor:pointer;box-shadow:0 8px 24px rgba(240,198,74,.28),inset 0 1px 0 rgba(255,255,255,.4);text-transform:uppercase\">{{ detail.saveLabel }}<\u002Fbutton>\n          <div style=\"text-align:center;font-family:Oswald;font-weight:600;font-size:14px;color:#F0C64A;margin-top:8px;min-height:18px;letter-spacing:.5px\">{{ detail.saveMsg }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== HISTORIAL ===== -->\n    <sc-if value=\"{{ isHistory }}\">\n      <div style=\"padding:18px 20px 44px\">\n        <button sc-camel-on-click=\"{{ history.back }}\" style=\"display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:#F0C64A;font-family:Oswald;font-weight:700;font-size:15px;letter-spacing:1px;cursor:pointer;padding:0;margin-bottom:16px\">‹ VOLVER A LA CARTELERA<\u002Fbutton>\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\">\n          <span style=\"font-family:Oswald;font-weight:700;font-size:11px;color:#0b0808;background:#F0C64A;border-radius:6px;padding:3px 9px;letter-spacing:1px\">🏆 PALMARÉS<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:Anton;font-size:40px;line-height:.96;color:#F4ECD8;margin:6px 0 2px;text-transform:uppercase;letter-spacing:1px\">Semanas<br>pasadas<\u002Fh2>\n        <div style=\"height:4px;width:64px;background:#C1121F;border-radius:2px;margin:12px 0 22px\"><\u002Fdiv>\n\n        <sc-if value=\"{{ history.hasVolume }}\">\n          <div style=\"background:#17100e;border:1.5px solid #C9962B;border-radius:16px;padding:16px 16px 18px;margin-bottom:18px;box-shadow:0 8px 20px rgba(0,0,0,.4)\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px\">\n              <span style=\"font-size:16px\">📈<\u002Fspan>\n              <span style=\"font-family:Anton;font-size:17px;color:#F4ECD8;letter-spacing:1px;text-transform:uppercase\">Volumen de trabajo<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px\">\n              <span style=\"font-family:'DM Sans';font-size:12px;color:#9a8f82\">kg × reps por sesión<\u002Fspan>\n              <span style=\"font-family:Oswald;font-weight:700;font-size:11px;letter-spacing:1px;color:#C9962B\">{{ history.fromLabel }} – {{ history.toLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;overflow-x:auto;padding-bottom:6px\">\n              <div style=\"flex:none;writing-mode:vertical-rl;transform:rotate(180deg);font-family:Oswald;font-weight:700;font-size:10px;letter-spacing:1.5px;color:#C9962B;text-align:center;padding:4px 0\">VOLUMEN (KG × REPS)<\u002Fdiv>\n              <div>\n                <div style=\"position:relative;min-width:100%\">\n                  <div style=\"{{ history.containerStyle }}\">\n                    <div style=\"{{ history.areaStyle }}\"><\u002Fdiv>\n                    <sc-for list=\"{{ history.segments }}\" as=\"sg\" hint-placeholder-count=\"8\">\n                      <div style=\"{{ sg.style }}\"><\u002Fdiv>\n                    <\u002Fsc-for>\n                    <sc-for list=\"{{ history.dots }}\" as=\"dt\" hint-placeholder-count=\"6\">\n                      <div title=\"{{ dt.title }}\" style=\"{{ dt.style }}\"><\u002Fdiv>\n                    <\u002Fsc-for>\n                    <sc-for list=\"{{ history.yAxisLabels }}\" as=\"yl\" hint-placeholder-count=\"2\">\n                      <span style=\"{{ yl.style }}\">{{ yl.text }}<\u002Fspan>\n                    <\u002Fsc-for>\n                    <sc-for list=\"{{ history.xAxisLabels }}\" as=\"xl\" hint-placeholder-count=\"2\">\n                      <span style=\"{{ xl.style }}\">{{ xl.text }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:center;font-family:Oswald;font-weight:700;font-size:10px;letter-spacing:1.5px;color:#C9962B;margin-top:6px\">FECHA DE LA SESIÓN<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ history.empty }}\">\n          <div style=\"text-align:center;padding:40px 20px;color:#9a8f82;font-family:'DM Sans';line-height:1.6\">\n            <div style=\"font-size:40px;margin-bottom:12px\">🗓️<\u002Fdiv>\n            <b style=\"color:#F4ECD8;font-family:Oswald;letter-spacing:1px\">AÚN NO HAY SEMANAS PASADAS<\u002Fb><br>\n            Completa funciones esta semana y aquí quedará tu registro.\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-for list=\"{{ history.weeks }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <div style=\"{{ w._wrap }}\">\n            <div style=\"background:#17100e;border:1.5px solid #C9962B;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 8px 20px rgba(0,0,0,.4)\">\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px\">\n                <div style=\"min-width:0\">\n                  <div style=\"font-family:Anton;font-size:22px;color:#F4ECD8;letter-spacing:.5px\">{{ w.range }}<\u002Fdiv>\n                  <div style=\"font-family:Oswald;font-weight:600;font-size:10px;letter-spacing:2px;color:#9a8f82;margin-top:2px\">SEMANA {{ w.weekNum }}<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{ w.champ }}\">\n                  <span style=\"flex:none;font-family:Oswald;font-weight:700;font-size:11px;letter-spacing:1px;color:#0b0808;background:linear-gradient(135deg,#F0C64A,#C9962B);border-radius:20px;padding:5px 11px\">👑 CAMPEONA<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:24px;margin-bottom:13px\">\n                <div>\n                  <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B\">FUNCIONES<\u002Fdiv>\n                  <div style=\"font-family:Anton;font-size:26px;color:#F0C64A;line-height:1.1\">{{ w.ganadas }}<span style=\"font-family:Oswald;font-weight:700;font-size:14px;color:#9a8f82\">/{{ w.total }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B\">EJERCICIOS<\u002Fdiv>\n                  <div style=\"font-family:Anton;font-size:26px;color:#F4ECD8;line-height:1.1\">{{ w.ejercicios }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"position:relative;height:8px;border-radius:5px;background:#120c0b;border:1px solid #3a2418;overflow:hidden\">\n                <div style=\"{{ w.fillStyle }}\"><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ w.hasWell }}\">\n                <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:13px\">\n                  <sc-for list=\"{{ w.badges }}\" as=\"b\" hint-placeholder-count=\"2\">\n                    <span style=\"{{ b._style }}\">{{ b.text }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <sc-if value=\"{{ history.notEmpty }}\">\n          <div style=\"margin-top:8px;background:#120c0b;border:1.5px solid #7d0a12;border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,.4)\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\">\n              <span style=\"font-size:17px\">📊<\u002Fspan>\n              <span style=\"font-family:Anton;font-size:19px;color:#F4ECD8;letter-spacing:1px;text-transform:uppercase\">Análisis de rendimiento<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'DM Sans';font-size:13px;color:#9a8f82;line-height:1.5;margin-bottom:15px\">Elige el rango de fechas y genera un análisis de fuerza, evolución y factores (hidratación, estrés, periodo).<\u002Fdiv>\n            <div style=\"display:flex;gap:10px;margin-bottom:12px\">\n              <div style=\"flex:1\">\n                <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B;margin-bottom:5px\">DESDE<\u002Fdiv>\n                <input type=\"date\" value=\"{{ history.anFrom }}\" sc-camel-on-change=\"{{ history.onFrom }}\" style=\"width:100%;box-sizing:border-box;font-family:'DM Sans';font-size:14px;color:#F4ECD8;background:#17100e;border:1px solid #3a2418;border-radius:10px;padding:9px 10px;outline:none;color-scheme:dark\">\n              <\u002Fdiv>\n              <div style=\"flex:1\">\n                <div style=\"font-family:Oswald;font-size:10px;font-weight:600;letter-spacing:1.5px;color:#C9962B;margin-bottom:5px\">HASTA<\u002Fdiv>\n                <input type=\"date\" value=\"{{ history.anTo }}\" sc-camel-on-change=\"{{ history.onTo }}\" style=\"width:100%;box-sizing:border-box;font-family:'DM Sans';font-size:14px;color:#F4ECD8;background:#17100e;border:1px solid #3a2418;border-radius:10px;padding:9px 10px;outline:none;color-scheme:dark\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <button sc-camel-on-click=\"{{ history.run }}\" disabled=\"{{ history.anLoading }}\" style=\"width:100%;border:none;border-radius:12px;padding:14px;font-family:Anton;font-size:17px;letter-spacing:1px;color:#0b0808;background:linear-gradient(135deg,#F0C64A,#C9962B);cursor:pointer;text-transform:uppercase;box-shadow:0 6px 18px rgba(240,198,74,.22)\">{{ history.anLabel }}<\u002Fbutton>\n            <sc-if value=\"{{ history.anError }}\">\n              <div style=\"margin-top:12px;font-family:'DM Sans';font-size:13px;color:#e88;background:rgba(193,18,31,.14);border:1px solid #7d0a12;border-radius:10px;padding:10px 12px;line-height:1.5\">{{ history.anError }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ history.hasResult }}\">\n              <div style=\"margin-top:16px;border-top:1px solid #3a2418;padding-top:16px\">{{ history.resultNode }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== CAMPANA DE RING ===== -->\n    <sc-if value=\"{{ bellShow }}\">\n      <div style=\"position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;pointer-events:none;background:radial-gradient(circle at 50% 42%, rgba(11,8,8,.45), transparent 60%)\">\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center\">\n          <div style=\"position:absolute;top:8px;width:130px;height:130px;border-radius:50%;border:4px solid #F0C64A;animation:ringWave 1s ease-out both\"><\u002Fdiv>\n          <div style=\"position:absolute;top:8px;width:130px;height:130px;border-radius:50%;border:4px solid #C1121F;animation:ringWave 1s ease-out .16s both\"><\u002Fdiv>\n          <div style=\"position:absolute;top:8px;width:130px;height:130px;border-radius:50%;border:3px solid #F0C64A;animation:ringWave 1s ease-out .32s both\"><\u002Fdiv>\n          <div style=\"font-size:92px;line-height:1;transform-origin:50% 14%;filter:drop-shadow(0 10px 20px rgba(0,0,0,.55));animation:bellPop .35s cubic-bezier(.2,.85,.3,1.2) both, bellRing .42s ease-in-out .28s 3\">🔔<\u002Fdiv>\n          <div style=\"margin-top:6px;font-family:Anton;font-size:36px;letter-spacing:4px;color:#F0C64A;text-transform:uppercase;text-shadow:0 3px 0 #7d0a12,0 6px 16px rgba(0,0,0,.6);animation:titleSlam .5s cubic-bezier(.2,.85,.3,1.1) both\">¡Ding Ding!<\u002Fdiv>\n          <div style=\"margin-top:4px;font-family:Oswald;font-weight:700;font-size:13px;letter-spacing:3px;color:#F4ECD8;animation:bellPop .4s ease-out .12s both\">FUNCIÓN GANADA<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 600, &quot;height&quot;: 1040 },\n  &quot;entranceFx&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Impacto&quot;, &quot;Rebote&quot;, &quot;Ninguna&quot;], &quot;default&quot;: &quot;Impacto&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Animación&quot;, &quot;label&quot;: &quot;Entrada de tarjetas&quot; },\n  &quot;showSunburst&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Estilo&quot;, &quot;label&quot;: &quot;Rayos de sol (sunburst)&quot; }\n}\">\nclass Component extends DCLogic {\n  // La clave de Gemini NO va en el código (GitHub la bloquea).\n  // Se lee desde Firestore: colección \"config\", documento \"app\", campo \"geminiKey\".\n  GEMINI_API_KEY = \"\";\n\n  state = {\n    view: 'list', selected: null,\n    loading: true, error: false,\n    saving: false, saveMsg: '',\n    rutinas: [], alumna: 'Jessi', detailEx: [],\n    doneIds: [], exDone: [], bellShow: false, remoteWeeks: {}, prevSnapshots: {},\n    wellness: {}, weekWellness: {},\n    anFrom: '', anTo: '', anResult: '', anLoading: false, anError: '',\n    geminiKey: ''\n  };\n\n  prevWeekKey() {\n    const d = new Date();\n    d.setDate(d.getDate() - 7);\n    const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));\n    const day = (t.getUTCDay() + 6) % 7;\n    t.setUTCDate(t.getUTCDate() - day + 3);\n    const firstThu = new Date(Date.UTC(t.getUTCFullYear(), 0, 4));\n    const week = 1 + Math.round(((t - firstThu) / 86400000 - 3 + ((firstThu.getUTCDay() + 6) % 7)) / 7);\n    return t.getUTCFullYear() + '-W' + week;\n  }\n\n  async loadPrevSnapshots(dayName) {\n    if (!this._db || !this._fs) return;\n    try {\n      const prevDoc = await this._fs.getDoc(this._fs.doc(this._db, 'progreso', this.prevWeekKey()));\n      const snaps = (prevDoc.exists() ? prevDoc.data() : {}).snapshots || {};\n      const filtered = {};\n      for (const key in snaps) {\n        if (key.indexOf(dayName + '#') === 0) filtered[key.slice(dayName.length + 1)] = snaps[key];\n      }\n      this.setState({ prevSnapshots: filtered });\n    } catch (e) { this.setState({ prevSnapshots: {} }); }\n  }\n\n  bumpWeight(peso) {\n    const s = ('' + (peso == null ? '' : peso)).trim();\n    if (!s) return s;\n    const low = s.toLowerCase();\n    const m = s.match(/-?\\d+(\\.\\d+)?/);\n    if (!m) return s;\n    const n = parseFloat(m[0]);\n    let inc = 10; // por defecto lb\n    if (low.indexOf('kg') >= 0) inc = 5;\n    else if (low.indexOf('nivel') >= 0) inc = 1;\n    else if (low.indexOf('lb') >= 0) inc = 10;\n    const nv = Math.round((n + inc) * 100) / 100;\n    return s.replace(m[0], '' + nv);\n  }\n\n  progressSerie(se) {\n    let reps = parseInt(se.reps, 10);\n    if (isNaN(reps)) reps = 7;\n    let peso = se.peso != null ? ('' + se.peso) : '';\n    reps = reps + 1;\n    if (reps > 12) { reps = 8; peso = this.bumpWeight(peso); }\n    return { peso, reps: '' + reps };\n  }\n\n  progressExercise(e) {\n    const base = (Array.isArray(e.series) && e.series.length) ? e.series : this.normSeries(e);\n    const series = base.map(se => this.progressSerie(se));\n    const o = { ...e, series, sets: series.length };\n    if (series[0]) { o.peso = series[0].peso; o.reps = series[0].reps; }\n    return o;\n  }\n\n  serieStr(s) {\n    return (s.peso || '—') + ' x ' + (s.reps || '—');\n  }\n\n  applyProgression(rutinas) {\n    // La progresion semanal ahora la hace y escribe el proceso de Python\n    // (cada lunes 00:00) para que el correo refleje el cambio REAL en Firebase.\n    // La app solo muestra lo que ya esta guardado; no calcula ni escribe aqui.\n    return rutinas;\n  }\n\n  _applyProgressionLegacy(rutinas) {\n    if (!this._db || !this._fs) return rutinas;\n    const changes = [];\n    const out = rutinas.map(r => {\n      if (r.progWeek === wk) return r;\n      if (!r.progWeek) {\n        this._fs.updateDoc(this._fs.doc(this._db, 'rutinas', r._id), { progWeek: wk }).catch(e => console.error('prog', e));\n        return { ...r, progWeek: wk };\n      }\n      const dayChanges = [];\n      const ejercicios = (r.ejercicios || []).map(e => {\n        const before = this.normSeries(e);\n        const ne = this.progressExercise(e);\n        const after = ne.series || [];\n        const diffs = [];\n        const n = Math.max(before.length, after.length);\n        for (let k = 0; k < n; k++) {\n          const b = before[k], a = after[k];\n          if (!a) continue;\n          if (!b || b.peso !== a.peso || ('' + b.reps) !== ('' + a.reps)) {\n            diffs.push({ serie: k + 1, de: b ? this.serieStr(b) : '—', a: this.serieStr(a) });\n          }\n        }\n        if (diffs.length) dayChanges.push({ ejercicio: e.nombre || 'Ejercicio', diffs });\n        return ne;\n      });\n      if (dayChanges.length) changes.push({ dia: r.nombre, ejercicios: dayChanges });\n      this._fs.updateDoc(this._fs.doc(this._db, 'rutinas', r._id), { progWeek: wk, ejercicios }).catch(e => console.error('prog', e));\n      return { ...r, progWeek: wk, ejercicios };\n    });\n    if (changes.length) this.maybeSendWeeklyEmail(wk, changes);\n    return out;\n  }\n\n  buildEmailBody(wk, changes) {\n    let txt = 'Rutina de Jessi — progresión automática\\nSemana: ' + wk + '\\n\\n';\n    changes.forEach(d => {\n      txt += '━━ ' + (d.dia || '') + ' ━━\\n';\n      d.ejercicios.forEach(ex => {\n        txt += '• ' + ex.ejercicio + '\\n';\n        ex.diffs.forEach(df => { txt += '    Serie ' + df.serie + ': ' + df.de + '  →  ' + df.a + '\\n'; });\n      });\n      txt += '\\n';\n    });\n    txt += 'Estos cambios ya están aplicados en la app. Si quieres ajustar algo, edítalo directamente.';\n    return txt;\n  }\n\n  async maybeSendWeeklyEmail(wk, changes) {\n    if (!this._db || !this._fs) return;\n    try {\n      // Evita duplicados entre dispositivos: marca el envío en Firestore.\n      const ref = this._fs.doc(this._db, 'progreso', wk);\n      const snap = await this._fs.getDoc(ref);\n      if (snap.exists() && snap.data().emailedWeek === wk) return;\n      const cfgSnap = await this._fs.getDoc(this._fs.doc(this._db, 'config', 'app'));\n      const cfg = cfgSnap.exists() ? cfgSnap.data() : {};\n      const service_id = cfg.emailServiceId, template_id = cfg.emailTemplateId, user_id = cfg.emailPublicKey;\n      const to = cfg.emailTo || 'lorenzohugo33@gmail.com';\n      if (!service_id || !template_id || !user_id) { console.warn('Email no configurado (config/app: emailServiceId, emailTemplateId, emailPublicKey)'); return; }\n      await this._fs.setDoc(ref, { emailedWeek: wk }, { merge: true });\n      const body = this.buildEmailBody(wk, changes);\n      const res = await fetch('https://api.emailjs.com/api/v1.0/email/send', {\n        method: 'POST', headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify({\n          service_id, template_id, user_id,\n          template_params: { to_email: to, semana: wk, cambios: body, subject: 'Rutina de Jessi — cambios de la semana ' + wk }\n        })\n      });\n      if (!res.ok) { console.error('EmailJS', res.status, await res.text()); await this._fs.setDoc(ref, { emailedWeek: '' }, { merge: true }); }\n    } catch (e) { console.error('maybeSendWeeklyEmail', e); }\n  }\n\n  playDing() {\n    try {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      if (!AC) return;\n      if (!this._ac) this._ac = new AC();\n      const ac = this._ac;\n      if (ac.state === 'suspended') ac.resume();\n      const now = ac.currentTime;\n      [0, 0.2, 0.4].forEach((t, idx) => {\n        const s = now + t;\n        const freq = idx === 2 ? 1180 : 940;\n        [1, 2.76].forEach((mult, k) => {\n          const o = ac.createOscillator(), g = ac.createGain();\n          o.type = 'triangle';\n          o.frequency.value = freq * mult;\n          o.connect(g); g.connect(ac.destination);\n          const peak = k === 0 ? 0.3 : 0.12;\n          g.gain.setValueAtTime(0.0001, s);\n          g.gain.exponentialRampToValueAtTime(peak, s + 0.008);\n          g.gain.exponentialRampToValueAtTime(0.0001, s + 0.2);\n          o.start(s); o.stop(s + 0.22);\n        });\n      });\n    } catch (e) {}\n  }\n\n  ringBell() {\n    this.playDing();\n    if (this._bellT) clearTimeout(this._bellT);\n    this.setState({ bellShow: false }, () => {\n      requestAnimationFrame(() => this.setState({ bellShow: true }));\n    });\n    this._bellT = setTimeout(() => this.setState({ bellShow: false }), 1500);\n  }\n\n  weekKey() {\n    const d = new Date();\n    const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));\n    const day = (t.getUTCDay() + 6) % 7;\n    t.setUTCDate(t.getUTCDate() - day + 3);\n    const firstThu = new Date(Date.UTC(t.getUTCFullYear(), 0, 4));\n    const week = 1 + Math.round(((t - firstThu) / 86400000 - 3 + ((firstThu.getUTCDay() + 6) % 7)) / 7);\n    return t.getUTCFullYear() + '-W' + week;\n  }\n\n  weekRange() {\n    const d = new Date();\n    const day = (d.getDay() + 6) % 7;\n    const mon = new Date(d); mon.setDate(d.getDate() - day);\n    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);\n    const M = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];\n    return mon.getDate() + ' ' + M[mon.getMonth()] + ' – ' + sun.getDate() + ' ' + M[sun.getMonth()];\n  }\n\n  toggleDone(id, ev) {\n    if (ev && ev.stopPropagation) ev.stopPropagation();\n    const cur = (this.state.doneIds || []).slice();\n    const i = cur.indexOf(id);\n    const adding = i < 0;\n    if (adding) cur.push(id); else cur.splice(i, 1);\n    try { localStorage.setItem('jessi-prog-' + this.weekKey(), JSON.stringify(cur)); } catch (e) {}\n    this.setState({ doneIds: cur });\n    this.pushProgress(cur, this.state.exDone);\n    if (adding) this.ringBell();\n  }\n\n  pushProgress(doneIds, exDone) {\n    if (!this._db || !this._fs) return;\n    const fs = this._fs, wk = this.weekKey();\n    fs.setDoc(fs.doc(this._db, 'progreso', wk), {\n      week: wk, doneIds: doneIds || [], exDone: exDone || [], updatedAt: Date.now()\n    }, { merge: true }).catch(e => console.error('pushProgress', e));\n  }\n\n  setWellness(dayId, field, value) {\n    const w = { ...(this.state.wellness || {}) };\n    const cur = { ...(w[dayId] || {}) };\n    if (field === 'periodo') cur.periodo = value;\n    else cur[field] = (cur[field] === value ? '' : value);\n    w[dayId] = cur;\n    this.setState({ wellness: w });\n    if (this._db && this._fs) {\n      this._fs.setDoc(this._fs.doc(this._db, 'progreso', this.weekKey()), { wellness: w }, { merge: true }).catch(e => console.error('wellness', e));\n    }\n  }\n\n  subscribeWeek(wk) {\n    if (!this._db || !this._fs) return;\n    if (this._unsub) { this._unsub(); this._unsub = null; }\n    const fs = this._fs;\n    this._unsub = fs.onSnapshot(fs.doc(this._db, 'progreso', wk), (snap) => {\n      const d = (snap && snap.exists && snap.exists()) ? snap.data() : null;\n      const doneIds = (d && d.doneIds) || [];\n      const exDone = (d && d.exDone) || [];\n      const wellness = (d && d.wellness) || {};\n      try { localStorage.setItem('jessi-prog-' + wk, JSON.stringify(doneIds)); } catch (e) {}\n      try { localStorage.setItem('jessi-ex-' + wk, JSON.stringify(exDone)); } catch (e) {}\n      this.setState({ doneIds, exDone, wellness });\n    }, (err) => console.error('onSnapshot', err));\n  }\n\n  toggleEx(dayId, j) {\n    const cur = (this.state.exDone || []).slice();\n    const key = dayId + '#' + j;\n    const idx = cur.indexOf(key);\n    const adding = idx < 0;\n    if (adding) cur.push(key); else cur.splice(idx, 1);\n    try { localStorage.setItem('jessi-ex-' + this.weekKey(), JSON.stringify(cur)); } catch (e) {}\n    this.setState({ exDone: cur });\n    let doneAfter = this.state.doneIds || [];\n    if (adding) {\n      this.playTick();\n      const r = this.state.rutinas.find(x => x._id === dayId);\n      const total = r ? (r.ejercicios || []).length : 0;\n      const doneN = cur.filter(k => k.indexOf(dayId + '#') === 0).length;\n      if (total > 0 && doneN === total && (this.state.doneIds || []).indexOf(dayId) < 0) {\n        const dd = (this.state.doneIds || []).slice(); dd.push(dayId);\n        try { localStorage.setItem('jessi-prog-' + this.weekKey(), JSON.stringify(dd)); } catch (e) {}\n        this.setState({ doneIds: dd });\n        doneAfter = dd;\n        this.ringBell();\n      }\n    }\n    this.pushProgress(doneAfter, cur);\n  }\n\n  playTick() {\n    try {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      if (!AC) return;\n      if (!this._ac) this._ac = new AC();\n      const ac = this._ac; if (ac.state === 'suspended') ac.resume();\n      const o = ac.createOscillator(), g = ac.createGain();\n      o.type = 'square'; o.frequency.value = 1320;\n      o.connect(g); g.connect(ac.destination);\n      const n = ac.currentTime;\n      g.gain.setValueAtTime(0.0001, n);\n      g.gain.exponentialRampToValueAtTime(0.16, n + 0.005);\n      g.gain.exponentialRampToValueAtTime(0.0001, n + 0.07);\n      o.start(n); o.stop(n + 0.08);\n    } catch (e) {}\n  }\n\n  checkWeek() {\n    const wk = this.weekKey();\n    if (wk === this._week) return;\n    this._week = wk;\n    let doneI is.state.rutinas || [];\n    const idName = {}; rutinas.forEach((r, i) => { idName[r._id] = r.nombre || ('Día ' + (i + 1)); });\n    const total = rutinas.length || 4;\n    const M = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];\n    const monday = (year, week) => {\n      const simple = new Date(Date.UTC(year, 0, 4));\n      const dow = (simple.getUTCDay() + 6) % 7;\n      const w1 = new Date(simple); w1.setUTCDate(simple.getUTCDate() - dow);\n      const mon = new Date(w1); mon.setUTCDate(w1.getUTCDate() + (week - 1) * 7);\n      return mon;\n    };\n    const wks = this.weeksInRange(fromStr, toStr).map(wk => {\n      const m = wk.match(/^(\\d+)-W(\\d+)$/);\n      return { wk, sk: m ? (+m[1] * 100 + +m[2]) : 0, year: m ? +m[1] : 0, week: m ? +m[2] : 0 };\n    }).sort((a, b) => a.sk - b.sk);\n    let out = '';\n    wks.forEach(({ wk, year, week }) => {\n      const d = docs[wk] || {};\n      const mon = monday(year, week);\n      const sun = new Date(mon); sun.setUTCDate(mon.getUTCDate() + 6);\n      const range = mon.getUTCDate() + ' ' + M[mon.getUTCMonth()] + ' - ' + sun.getUTCDate() + ' ' + M[sun.getUTCMonth()] + ' ' + year;\n      out += '\\n== Semana ' + week + ' (' + range + ') ==\\n';\n      out += 'Funciones completadas: ' + ((d.doneIds || []).length) + ' de ' + total + '\\n';\n      out += 'Series completadas: ' + ((d.exDone || []).length) + '\\n';\n      const w = d.wellness || {};\n      Object.keys(w).forEach(id => {\n        const dd = w[id] || {};\n        const bits = [];\n        if (dd.periodo) bits.push('periodo menstrual: SÍ');\n        if (dd.hidratacion) bits.push('hidratación: ' + dd.hidratacion);\n        if (dd.estres) bits.push('estrés: ' + dd.estres);\n        if (bits.length) out += '  ' + (idName[id] || id) + ' → ' + bits.join(', ') + '\\n';\n      });\n      const snaps = d.snapshots || {};\n      const sk = Object.keys(snaps);\n      if (sk.length) {\n        out += 'Cargas registradas:\\n';\n const text = parts.map(p => p.text || '').join('').trim();\n      if (!text) throw new Error('No se recibió respuesta. Verifica tu clave.');\n      this.setState({ anResult: text, anLoading: false });\n    } catch (e) {\n      this.setState({ anError: (e && e.message) ? e.message : 'No se pudo generar el análisis.', anLoading: false });\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._unsub) { this._unsub(); this._unsub = null; }\n    if (this._weekTimer) clearInterval(this._weekTimer);\n    if (this._onVis) {\n      document.removeEventListener('visibilitychange', this._onVis);\n      window.removeEventListener('focus', this._onVis);\n    }\n  }\n\n  async componentDidMount() {\n    this._week = this.weekKey();\n    this._weekTimer = setInterval(() => this.checkWeek(), 30000);\n    this._onVis = () => this.checkWeek();\n    document.addEventListener('visibilitychange', this._onVis);\n    window.addEventListener('focus', this._onVis);\n    try {\n      const appMod = await import(\"https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js\");\n      const fs = await import(\"https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js\");\n      const firebaseConfig = {\n        apiKey: \"AIzaSyBU7g0qQFv3La_evrvASYgYFQI3t9wimSw\",\n        authDomain: \"asesoriasjessi.firebaseapp.com\",\n        projectId: \"asesoriasjessi\",\n        storageBucket: \"asesoriasjessi.firebasestorage.app\",\n        messagingSenderId: \"363108342077\",\n        appId: \"1:363108342077:web:2d2bce050eccd3fd814d54\"\n      };\n      this._fs = fs;\n      this._db = fs.getFirestore(appMod.initializeApp(firebaseConfig));\n      const snap = await fs.getDocs(fs.query(fs.collection(this._db, \"rutinas\"), fs.orderBy(\"orden\")));\n      const docs = snap.docs.map(d => ({ _id: d.id, ...d.data() })).filter(r => !r.archivada);\n      const alumna = docs.length ? (docs[0].alumna || \"Jessi\") : \"Jessi\";\n      let rutinas = docs.map(r => ({ ...r, ejercicios: (r.ejercicios || []) }));\n      rutinas = this.applyProgression(rutinas);\n      let doneIds = [], exDone = [];\n      try { const raw = localStorage.getItem('jessi-prog-' + this.weekKey()); if (raw) doneIds = JSON.parse(raw) || []; } catch (e) {}\n      try { const rex = localStorage.getItem('jessi-ex-' + this.weekKey()); if (rex) exDone = JSON.parse(rex) || []; } catch (e) {}\n      let geminiKey = '';\n      try { geminiKey = localStorage.getItem('jessi-gemini-key') || ''; } catch (e) {}\n      this.setState({ rutinas, alumna, loading: false, doneIds, exDone, geminiKey });\n      this.subscribeWeek(this.weekKey());\n      try {\n        const cfg = await fs.getDoc(fs.doc(this._db, 'config', 'app'));\n        const k = (cfg.exists() ? cfg.data() : {}).geminiKey;\n        if (k) this.setState({ geminiKey: k });\n      } catch (e) { console.error('config', e); }\n    } catch (e) {\n      console.error(e);\n      this.setState({ loading: false, error: true });\n    }\n  }\n\n  normSeries(e) {\n    if (Array.isArray(e.series) && e.series.length) {\n      return e.series.map(s => ({ peso: s.peso != null ? ('' + s.peso) : '', reps: s.reps != null ? ('' + s.reps) : '' }));\n    }\n    let n = parseInt(e.sets, 10);\n    if (isNaN(n) || n < 1) n = 3;\n    n = Math.min(n, 20);\n    const out = [];\n    for (let k = 0; k < n; k++) out.push({ peso: e.peso != null ? ('' + e.peso) : '', reps: e.reps != null ? ('' + e.reps) : '' });\n    return out;\n  }\n\n  open(i) {\n    const r = this.state.rutinas[i];\n    const ej = (r && r.ejercicios) || [];\n    const detailEx = JSON.parse(JSON.stringify(ej)).map(e => ({ ...e, series: this.normSeries(e) }));\n    this.setState({ view: 'detail', selected: i, saveMsg: '', detailEx, prevSnapshots: {} });\n    if (r) this.loadPrevSnapshots(r.nombre);\n    if (typeof window !== 'undefined') window.scrollTo(0, 0);\n  }\n\n  updSerie(exIdx, sIdx, key, val) {\n    const ex = this.state.detailEx.slice();\n    const e = { ...ex[exIdx] };\n    const series = (e.series || []).slice();\n    series[sIdx] = { ...series[sIdx], [key]: val };\n    e.series = series;\n    ex[exIdx] = e;\n    this.setState({ detailEx: ex });\n  }\n\n  addSerie(exIdx) {\n    const ex = this.state.detailEx.slice();\n    const e = { ...ex[exIdx] };\n    const series = (e.series || []).slice();\n    const last = series[series.length - 1] || { peso: '', reps: '' };\n    series.push({ peso: last.peso || '', reps: '' });\n    e.series = series;\n    ex[exIdx] = e;\n    this.setState({ detailEx: ex });\n  }\n\n  removeSerie(exIdx, sIdx) {\n    const ex = this.state.detailEx.slice();\n    const e = { ...ex[exIdx] };\n    const series = (e.series || []).slice();\n    if (series.length <= 1) return;\n    series.splice(sIdx, 1);\n    e.series = series;\n    ex[exIdx] = e;\n    this.setState({ detailEx: ex });\n  }\n\n  toggleSerie(dayId, exIdx, sIdx) {\n    const cur = (this.state.exDone || []).slice();\n    const key = dayId + '#' + exIdx + '#' + sIdx;\n    const idx = cur.indexOf(key);\n    const adding = idx < 0;\n    if (adding) cur.push(key); else cur.splice(idx, 1);\n    try { localStorage.setItem('jessi-ex-' + this.weekKey(), JSON.stringify(cur)); } catch (e) {}\n    this.setState({ exDone: cur });\n    let doneAfter = this.state.doneIds || [];\n    if (adding) {\n      this.playTick();\n      const totalSeries = (this.state.detailEx || []).reduce((a, e) => a + ((e.series || []).length), 0);\n      const doneSeries = cur.filter(k => k.indexOf(dayId + '#') === 0).length;\n      if (totalSeries > 0 && doneSeries >= totalSeries && (this.state.doneIds || []).indexOf(dayId) < 0) {\n        const dd = (this.state.doneIds || []).slice(); dd.push(dayId);\n        try { localStorage.setItem('jessi-prog-' + this.weekKey(), JSON.stringify(dd)); } catch (e) {}\n        this.setState({ doneIds: dd });\n        doneAfter = dd;\n        this.ringBell();\n      }\n    }\n    this.pushProgress(doneAfter, cur);\n  }\n\n  back() {\n    this.setState({ view: 'list', saveMsg: '' });\n    if (typeof window !== 'undefined') window.scrollTo(0, 0);\n  }\n\n  updField(j, k, v) {\n    const ex = this.state.detailEx.slice();\n    ex[j] = { ...ex[j], [k]: v };\n    this.setState({ detailEx: ex });\n  }\n\n  async save() {\n    const i = this.state.selected;\n    const r = this.state.rutinas[i];\n    if (!r) return;\n    const ejercicios = this.state.detailEx.map(e => {\n      const series = (e.series || []).map(s => ({ peso: s.peso || '', reps: s.reps || '' }));\n      const o = { ...e, series, sets: series.length };\n      if (series[0]) { o.peso = series[0].peso; o.reps = series[0].reps; }\n      return o;\n    });\n    this.setState({ saving: true, saveMsg: 'Guardando…' });\n    try {\n      await this._fs.updateDoc(this._fs.doc(this._db, \"rutinas\", r._id), { ejercicios });\n      const rut = this.state.rutinas.slice();\n      rut[i] = { ...rut[i], ejercicios };\n      this.setState({ saving: false, saveMsg: '¡GUARDADO! 🔔 ¡Y GANAS!', rutinas: rut });\n      const snapshots = {};\n      ejercicios.forEach(e => {\n        if (e.nombre) snapshots[r.nombre + '#' + e.nombre] = { series: (e.series || []).map(s => ({ peso: s.peso || '', reps: s.reps || '' })) };\n      });\n      this._fs.setDoc(this._fs.doc(this._db, 'progreso', this.weekKey()), { snapshots }, { merge: true }).catch(err => console.error('snapshots', err));\n    } catch (e) {\n      console.error(e);\n      this.setState({ saving: false, saveMsg: 'Error al guardar. Revisa las reglas de escritura.' });\n    }\n  }\n\n  renderVals() {\n    const s = this.state;\n    const str = v => (v == null ? '' : ('' + v));\n    const pad = n => ('0' + n).slice(-2);\n\n    const fx = this.props.entranceFx ?? 'Impacto';\n    const mkAnim = (dur, delay) => {\n      if (fx === 'Ninguna') return {};\n      const name = fx === 'Rebote' ? 'bounceIn' : 'impactIn';\n      return { animation: name + ' ' + dur + 's cubic-bezier(.2,.85,.3,1.15) both', animationDelay: delay + 's' };\n    };\n\n    const doneSet = s.doneIds || [];\n    const isDone = id => doneSet.indexOf(id) >= 0;\n\n    const days = s.rutinas.map((r, i) => {\n      const done = isDone(r._id);\n      return {\n        nombre: r.nombre,\n        funcion: pad(i + 1),\n        count: (r.ejercicios || []).length,\n        short: (r.nombre || '').slice(0, 3).toUpperCase(),\n        done,\n        medalMark: done ? '✓' : '🎭',\n        medalStyle: {\n          width: '100%', maxWidth: '50px', aspectRatio: '1', margin: '0 auto',\n          borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',\n          fontFamily: 'Anton', fontSize: done ? '22px' : '18px',\n          background: done ? 'linear-gradient(135deg,#F0C64A,#C9962B)' : '#120c0b',\n          color: done ? '#0b0808' : '#5a4a3a',\n          border: done ? '2px solid #F0C64A' : '2px dashed #3a2418',\n          boxShadow: done ? '0 4px 14px rgba(240,198,74,.4)' : 'none',\n          transition: 'all .3s ease'\n        },\n        toggleLabel: done ? '✓ GANADA' : 'MARCAR GANADA',\n        toggleStyle: {\n          fontFamily: 'Oswald', fontWeight: '700', fontSize: '12px', letterSpacing: '1px',\n          borderRadius: '8px', cursor: 'pointer', transition: 'all .2s ease',\n          padding: done ? '7px 12px' : '6px 12px',\n          border: done ? 'none' : '1.5px solid #C9962B',\n          background: done ? 'linear-gradient(135deg,#F0C64A,#C9962B)' : 'transparent',\n          color: done ? '#0b0808' : '#F0C64A'\n        },\n        toggleDone: (ev) => this.toggleDone(r._id, ev),\n        open: () => this.open(i),\n        _wrap: mkAnim(0.55, i * 0.09)\n      };\n    });\n\n    const total = s.rutinas.length;\n    const doneCount = s.rutinas.filter(r => isDone(r._id)).length;\n    const pct = total ? Math.round(doneCount / total * 100) : 0;\n    const progress = {\n      total, doneCount, pct,\n      range: this.weekRange(),\n      allDone: total > 0 && doneCount === total,\n      fillStyle: {\n        height: '100%', width: pct + '%',\n        background: 'linear-gradient(90deg,#C1121F,#F0C64A)', borderRadius: '8px',\n        transition: 'width .55s cubic-bezier(.2,.8,.3,1)', boxShadow: '0 0 12px rgba(240,198,74,.5)'\n      }\n    };\n\n    let detail = null;\n    if (s.view === 'detail' && s.selected != null && s.rutinas[s.selected]) {\n      const r = s.rutinas[s.selected];\n      const exSet = s.exDone || [];\n      const isSerieDone = (exIdx, sIdx) => exSet.indexOf(r._id + '#' + exIdx + '#' + sIdx) >= 0;\n      const mkCheck = d => ({\n        flex: 'none', width: '30px', height: '30px', borderRadius: '50%', cursor: 'pointer',\n        display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto',\n        fontFamily: 'Anton', fontSize: '15px', transition: 'all .2s ease', padding: '0',\n        border: d ? 'none' : '2px solid #C9962B',\n        background: d ? 'linear-gradient(135deg,#F0C64A,#C9962B)' : 'transparent',\n        color: '#0b0808', boxShadow: d ? '0 3px 10px rgba(240,198,74,.4)' : 'none'\n      });\n      const ejercicios = s.detailEx.map((e, j) => {\n        const prevEx = (s.prevSnapshots || {})[e.nombre];\n        const prevSeries = (prevEx && prevEx.series) || [];\n        const series = (e.series || []).map((se, k) => {\n          const sdone = isSerieDone(j, k);\n          const pv = prevSeries[k];\n          const hasPrev = pv && (pv.peso || pv.reps);\n          return {\n            num: k + 1,\n            peso: str(se.peso), reps: str(se.reps),\n            anterior: hasPrev ? ((pv.peso || '—') + ' lbs x ' + (pv.reps || '—')) : '—',\n            done: sdone,\n            checkMark: sdone ? '✓' : '',\n            checkStyle: mkCheck(sdone),\n            removeStyle: {\n              flex: 'none', width: '26px', height: '26px', borderRadius: '50%', cursor: 'pointer',\n              display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0',\n              fontFamily: 'Oswald', fontWeight: '700', fontSize: '13px', lineHeight: adius: '10px',\n            padding: '9px 4px', fontFamily: 'Oswald', fontWeight: '700', fontSize: '13px',\n            letterSpacing: '.5px', transition: 'all .15s ease',\n            border: active ? ('1.5px solid ' + c) : '1.5px solid #3a2418',\n            background: active ? c : 'transparent',\n            color: active ? '#0b0808' : '#9a8f82'\n          },\n          on: () => this.setWellness(r._id, field, opt)\n        };\n      };\n      const wellness = {\n        periodo: !!dw.periodo,\n        periodoStyle: {\n          display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer',\n          borderRadius: '12px', padding: '11px 13px', userSelect: 'none',\n          border: dw.periodo ? '1.5px solid #C1121F' : '1.5px solid #3a2418',\n          background: dw.periodo ? 'rgba(193,18,31,.16)' : '#120c0b', transition: 'all .15s ease'\n        },\n        boxStyle: {\n          width: '24px', height: '24px', borderRadius: '7px', flex: 'none',\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          fontFamily: 'Anton', fontSize: '14px', color: '#0b0808',\n          border: dw.periodo ? 'none' : '2px solid #C9962B',\n          background: dw.periodo ? '#C1121F' : 'transparent'\n        },\n        periodoMark: dw.periodo ? '✓' : '',\n        togglePeriodo: () => this.setWellness(r._id, 'periodo', !dw.periodo),\n        hid: [mkSeg('hidratacion', 'bien', 'BIEN'), mkSeg('hidratacion', 'regular', 'REGULAR'), mkSeg('hidratacion', 'mal', 'MAL')],\n        est: [mkSeg('estres', 'bien', 'BIEN'), mkSeg('estres', 'regular', 'REGULAR'), mkSeg('estres', 'mal', 'MAL')]\n      };\n      detail = {\n        nombre: r.nombre,\n        funcion: pad(s.selected + 1),\n        ejercicios,\n        wellness,\n        exTotal, exDoneCount,\n        exFillStyle: {\n          height: '100%', width: exPct + '%',\n          background: 'linear-gradient(90deg,#C1121F,#F0C64A)', borderRadius: '6px',\n          transition: 'width .5s cubic-bezier(.2

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rutina de Jessi</title>
<style>
  :root{
    --bg:#ffffff; --card:#FBFBFC; --border:#EEEFF1;
    --ink:#1B1B1B; --muted:#8B8B8B;
    --orange:#EC9A52; --teal:#46697A; --chip:#BFD6DE; --serie:#DDEBF1;
    --note:#FBF1E6; --radius:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink)}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
    max-width:560px;margin:0 auto;padding:22px 20px 100px;
    padding-top:max(22px,env(safe-area-inset-top));
  }
  h1{font-size:30px;font-weight:800;margin:0}
  .top{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:8px}
  .back{position:absolute;left:0;background:none;border:none;font-size:30px;line-height:1;color:var(--ink);cursor:pointer;padding:2px 8px}
  .sub{color:var(--muted);font-size:15px;margin:0 0 22px;text-align:center}

  .card{
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);padding:22px 22px 10px;margin-bottom:18px;
    box-shadow:0 1px 2px rgba(0,0,0,.02);
  }
  .card.tap{cursor:pointer;transition:transform .12s ease}
  .card.tap:active{transform:scale(.985)}
  .card h2{font-size:23px;font-weight:800;margin:0 0 14px}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;font-size:18px;gap:14px}
  .row .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .x{color:var(--muted);font-variant-numeric:tabular-nums;flex:none}

  .ex{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
  .ex .name-in{font-size:20px;font-weight:700;line-height:1.2;margin-bottom:14px;width:100%;border:none;background:transparent;color:var(--ink);outline:none;border-bottom:1px dashed transparent;padding:2px 0}
  .ex .name-in:focus{border-bottom-color:var(--chip)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stat{background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px 8px;text-align:center}
  .stat .k{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .stat input{width:100%;border:none;background:transparent;text-align:center;font-size:18px;font-weight:700;margin-top:4px;color:var(--ink);outline:none}
  .stat input:focus{color:var(--teal)}
  .field{margin-top:12px}
  .field label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px}
  .field input{width:100%;border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:15px;color:var(--ink);background:#fff;outline:none;font-family:inherit}
  .field input:focus{border-color:var(--chip)}
  .field.nota input{background:var(--note);border-color:#F0DEC8}
  .head-label{font-size:22px;font-weight:800;margin:24px 0 12px}

  .savebar{position:fixed;left:0;right:0;bottom:0;padding:14px 20px max(14px,env(safe-area-inset-bottom));
    background:linear-gradient(to top,#fff 70%,rgba(255,255,255,0));max-width:560px;margin:0 auto}
  .savebar button{width:100%;background:var(--orange);color:#fff;border:none;border-radius:16px;
    padding:15px;font-size:17px;font-weight:800;cursor:pointer}
  .savebar button:disabled{opacity:.55;cursor:default}
  .savebar .msg{text-align:center;font-size:13px;color:var(--muted);margin-top:6px;min-height:16px}

  .state{text-align:center;color:var(--muted);padding:60px 20px;line-height:1.5}
  .state b{color:var(--ink)}
  @media (prefers-reduced-motion:reduce){.card.tap{transition:none}}
</style>
</head>
<body>
  <div id="app"><div class="state">Cargando…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBU7g0qQFv3La_evrvASYgYFQI3t9wimSw",
  authDomain: "asesoriasjessi.firebaseapp.com",
  projectId: "asesoriasjessi",
  storageBucket: "asesoriasjessi.firebasestorage.app",
  messagingSenderId: "363108342077",
  appId: "1:363108342077:web:2d2bce050eccd3fd814d54"
};

const db = getFirestore(initializeApp(firebaseConfig));
const root = document.getElementById("app");
let alumna = "Rutina", rutinas = [];

function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function att(s){return (s??"").toString().replace(/"/g,"&quot;");}

async function load(){
  try{
    const snap = await getDocs(query(collection(db,"rutinas"), orderBy("orden")));
    const docs = snap.docs.map(d=>({_id:d.id, ...d.data()})).filter(r=>!r.archivada);
    if(docs.length){ alumna = docs[0].alumna || "Rutina"; }
    rutinas = docs.map(r=>({...r, ejercicios:(r.ejercicios||[])}));
    renderList();
  }catch(e){
    console.error(e);
    root.innerHTML = `<div class="state"><b>No se pudo cargar la rutina.</b><br>Revisa las reglas de Firestore y la config.</div>`;
  }
}

function renderList(){
  const cards = rutinas.map((r,i)=>{
    const lines = r.ejercicios.map(e=>
      `<div class="row"><span class="name">${esc(e.nombre)}</span><span class="x">x${e.sets??"-"}</span></div>`
    ).join("");
    return `<div class="card tap" data-i="${i}"><h2>${esc(r.nombre)}</h2>${lines}</div>`;
  }).join("");
  root.innerHTML = `
    <div class="top"><h1>Rutina</h1></div>
    <div class="sub">${esc(alumna)}</div>
    ${cards || `<div class="state">Aún no hay rutina asignada.</div>`}`;
  root.querySelectorAll(".card.tap").forEach(c=>
    c.onclick=()=>{renderDetail(+c.dataset.i); window.scrollTo(0,0);});
}

function renderDetail(i){
  const r = rutinas[i];
  const ex = r.ejercicios.map((e,j)=>`
    <div class="ex" data-j="${j}">
      <input class="name-in" data-k="nombre" value="${att(e.nombre)}" placeholder="Ejercicio" />
      <div class="stats">
        <div class="stat"><div class="k">Sets</div><input inputmode="numeric" data-k="sets" value="${att(e.sets)}" /></div>
        <div class="stat"><div class="k">Reps</div><input data-k="reps" value="${att(e.reps)}" /></div>
        <div class="stat"><div class="k">Peso</div><input data-k="peso" value="${att(e.peso)}" /></div>
      </div>
      <div class="field"><label>Descanso</label><input data-k="descanso" value="${att(e.descanso)}" placeholder="—" /></div>
      <div class="field nota"><label>Nota</label><input data-k="nota" value="${att(e.nota)}" placeholder="—" /></div>
    </div>`).join("");
  root.innerHTML = `
    <div class="top"><button class="back" aria-label="Volver">‹</button><h1>${esc(r.nombre)}</h1></div>
    <div class="sub">${esc(alumna)}</div>
    <div class="head-label">Ejercicios</div>
    ${ex}
    <div class="savebar"><button id="save">Guardar cambios</button><div class="msg" id="msg"></div></div>`;

  root.querySelector(".back").onclick=()=>{renderList(); window.scrollTo(0,0);};

  root.querySelectorAll(".ex").forEach(card=>{
    const j = +card.dataset.j;
    card.querySelectorAll("[data-k]").forEach(inp=>{
      inp.oninput=()=>{
        let v = inp.value;
        if(inp.dataset.k==="sets"){ v = v.trim()===""?null:(isNaN(+v)?v:+v); }
        r.ejercicios[j][inp.dataset.k]=v;
      };
    });
  });

  const btn = root.querySelector("#save"), msg = root.querySelector("#msg");
  btn.onclick=async ()=>{
    btn.disabled=true; msg.textContent="Guardando…";
    try{
      await updateDoc(doc(db,"rutinas",r._id), { ejercicios: r.ejercicios });
      msg.textContent="Guardado ✓";
    }catch(e){
      console.error(e); msg.textContent="Error al guardar. Revisa las reglas de escritura.";
    }
    btn.disabled=false;
  };
}

load();
</script>
</body>
</html>

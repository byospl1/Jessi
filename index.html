<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rutina de Jessi</title>
<style>
  :root{
    --bg:#ffffff; --card:#FBFBFC; --border:#EEEFF1;
    --ink:#1B1B1B; --muted:#8B8B8B;
    --orange:#EC9A52; --teal:#46697A; --chip:#BFD6DE; --serie:#DDEBF1;
    --note:#FBF1E6; --radius:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink)}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
    max-width:560px;margin:0 auto;padding:22px 20px 60px;
    padding-top:max(22px,env(safe-area-inset-top));
  }
  h1{font-size:30px;font-weight:800;margin:0}
  .top{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:8px}
  .back{position:absolute;left:0;background:none;border:none;font-size:30px;line-height:1;color:var(--ink);cursor:pointer;padding:2px 8px}
  .sub{color:var(--muted);font-size:15px;margin:0 0 22px;text-align:center}

  .card{
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);padding:22px 22px 10px;margin-bottom:18px;
    box-shadow:0 1px 2px rgba(0,0,0,.02);
  }
  .card.tap{cursor:pointer;transition:transform .12s ease}
  .card.tap:active{transform:scale(.985)}
  .card h2{font-size:23px;font-weight:800;margin:0 0 14px}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;font-size:18px;gap:14px}
  .row .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .x{color:var(--muted);font-variant-numeric:tabular-nums;flex:none}

  .ex{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
  .ex .name{font-size:20px;font-weight:700;line-height:1.2;margin-bottom:14px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stat{background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px 8px;text-align:center}
  .stat .k{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .stat .v{font-size:19px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
  .rest{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:var(--serie);
        color:var(--teal);font-weight:700;font-size:14px;padding:6px 12px;border-radius:20px}
  .note{margin-top:12px;background:var(--note);border-left:3px solid var(--orange);
        border-radius:10px;padding:11px 14px;font-size:15px;line-height:1.4;color:#5a4b3a}
  .head-label{font-size:22px;font-weight:800;margin:24px 0 12px}

  .state{text-align:center;color:var(--muted);padding:60px 20px;line-height:1.5}
  .state b{color:var(--ink)}
  @media (prefers-reduced-motion:reduce){.card.tap{transition:none}}
</style>
</head>
<body>
  <div id="app"><div class="state">Cargando…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBU7g0qQFv3La_evrvASYgYFQI3t9wimSw",
  authDomain: "asesoriasjessi.firebaseapp.com",
  projectId: "asesoriasjessi",
  storageBucket: "asesoriasjessi.firebasestorage.app",
  messagingSenderId: "363108342077",
  appId: "1:363108342077:web:2d2bce050eccd3fd814d54"
};

const root = document.getElementById("app");
let alumna = "Rutina", rutinas = [];

function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function val(v){return (v===null||v===undefined||v==="----"||v==="")?"—":esc(v);}

async function load(){
  try{
    const db = getFirestore(initializeApp(firebaseConfig));
    const snap = await getDocs(query(collection(db,"rutinas"), orderBy("orden")));
    const docs = snap.docs.map(d=>d.data()).filter(r=>!r.archivada);
    if(docs.length){ alumna = docs[0].alumna || "Rutina"; }
    rutinas = docs.map(r=>({...r, ejercicios:(r.ejercicios||[])}));
    renderList();
  }catch(e){
    console.error(e);
    root.innerHTML = `<div class="state"><b>No se pudo cargar la rutina.</b><br>Revisa las reglas de Firestore (lectura pública) y la config.</div>`;
  }
}

function renderList(){
  const cards = rutinas.map((r,i)=>{
    const lines = r.ejercicios.map(e=>
      `<div class="row"><span class="name">${esc(e.nombre)}</span><span class="x">x${e.sets??"-"}</span></div>`
    ).join("");
    return `<div class="card tap" data-i="${i}"><h2>${esc(r.nombre)}</h2>${lines}</div>`;
  }).join("");
  root.innerHTML = `
    <div class="top"><h1>Rutina</h1></div>
    <div class="sub">${esc(alumna)}</div>
    ${cards || `<div class="state">Aún no hay rutina asignada.</div>`}`;
  root.querySelectorAll(".card.tap").forEach(c=>
    c.onclick=()=>{renderDetail(+c.dataset.i); window.scrollTo(0,0);});
}

function renderDetail(i){
  const r = rutinas[i];
  const ex = r.ejercicios.map(e=>`
    <div class="ex">
      <div class="name">${esc(e.nombre)}</div>
      <div class="stats">
        <div class="stat"><div class="k">Sets</div><div class="v">${val(e.sets)}</div></div>
        <div class="stat"><div class="k">Reps</div><div class="v">${val(e.reps)}</div></div>
        <div class="stat"><div class="k">Peso</div><div class="v">${val(e.peso)}</div></div>
      </div>
      ${e.descanso?`<div class="rest">⏱ Descanso ${esc(e.descanso)}</div>`:""}
      ${e.nota?`<div class="note">${esc(e.nota)}</div>`:""}
    </div>`).join("");
  root.innerHTML = `
    <div class="top"><button class="back" aria-label="Volver">‹</button><h1>${esc(r.nombre)}</h1></div>
    <div class="sub">${esc(alumna)}</div>
    <div class="head-label">Ejercicios</div>
    ${ex}`;
  root.querySelector(".back").onclick=()=>{renderList(); window.scrollTo(0,0);};
}

load();
</script>
</body>
</html>
